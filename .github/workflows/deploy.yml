name: Deploy Buscast

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean bootJar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "build/libs/buscast-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/app"

      - name: Restart Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -x
  
            echo "STEP1"
            mkdir -p /home/ubuntu/app
  
            JAR=$(find /home/ubuntu/app/build/libs -name "*.jar" | head -n 1)
            
            cp -f "$JAR" /home/ubuntu/app/buscast.jar
            
            PID=$(pgrep -f "java -jar /home/ubuntu/app/buscast.jar")
  
            if [ -n "$PID" ]; then
              kill "$PID"
              sleep 2
            fi
            
            nohup env BUS_LOCATION_API_KEY="${{ secrets.BUS_LOCATION_API_KEY }}" \
            java -jar /home/ubuntu/app/buscast.jar \
            > /home/ubuntu/app/app.log 2>&1 &
            
            sleep 10
            
            echo "===== PROCESS ====="
            pgrep -af buscast.jar || true
            
            echo "===== APP LOG ====="
            tail -100 /home/ubuntu/app/app.log