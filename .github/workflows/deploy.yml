name: Deploy Buscast

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean bootJar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "build/libs/buscast-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/app"

      - name: Restart Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -x
  
            echo "STEP1"
            mkdir -p /home/ubuntu/app
            
            echo "STEP2"
            JAR=$(find /home/ubuntu/app/build/libs -name "*.jar" | head -n 1)
            echo "$JAR"
            
            echo "STEP3"
            cp -f "$JAR" /home/ubuntu/app/buscast.jar
            
            echo "STEP4"
            
            echo "STEP5"
            export BUS_LOCATION_API_KEY="${{ secrets.BUS_LOCATION_API_KEY }}"
            
            echo "STEP6"
            nohup java -jar /home/ubuntu/app/buscast.jar > /home/ubuntu/app/app.log 2>&1 &
            
            echo "STEP7"
            sleep 5
            
            echo "STEP8"
            pgrep -f "/home/ubuntu/app/buscast.jar"
            
            echo "DONE"