name: Deploy Buscast

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean bootJar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "build/libs/buscast-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/app"

      - name: Restart Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            mkdir -p /home/ubuntu/app

            find /home/ubuntu/app -name "*.jar"

            JAR=$(find /home/ubuntu/app -name "*.jar" | head -n 1)

            if [ -z "$JAR" ]; then
              echo "JAR not found!"
              exit 1
            fi

            cp "$JAR" /home/ubuntu/app/buscast.jar

            pkill -f buscast.jar || true

            export BUS_LOCATION_API_KEY="${{ secrets.BUS_LOCATION_API_KEY }}"

            setsid java -jar /home/ubuntu/app/buscast.jar > /home/ubuntu/app/app.log 2>&1 < /dev/null &
            disown || true
            exit 0